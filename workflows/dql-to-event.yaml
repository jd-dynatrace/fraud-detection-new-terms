title: Fraud Detection - New Term Beneficiaries - DQL to Event
schemaVersion: 4
trigger:
  schedule:
    filterParameters: {}
    inputs: {}
    isActive: false
    isFaulty: false
    nextExecution: null
    rule: null
    timezone: Europe/Amsterdam
    trigger:
      intervalMinutes: 5
      type: interval
triggerType: Schedule
type: STANDARD
hourlyExecutionLimit: 100
guide: |-
  ## Banking Alert — New Term Beneficiaries

  Runs every 5 minutes. Detects outbound transactions to beneficiaries that are not in the `banking_beneficiaries` lookup table for the originating account — i.e. first-time sends that may indicate fraud.

  **Ordering:** This workflow runs at :00/:05/:10/... — always 1 minute BEFORE the lookup update workflow (DQL to Lookup) which runs at :01/:06/:11/...
  This guarantees: alert fires first → lookup learns the new beneficiary → next run is clean.

  **Data source:** Currently uses a synthetic inline dataset. Replace the `data ... record(...)` block in `detect_new_term_transactions` with:
  ```
  fetch logs, from:now()-6m
  | filter `event.type` == "banking.transaction" and `transaction.status` == "COMPLETED"
  ```
  Use `scripts/generate_logs.py` to send synthetic log records for testing.

  **What fires an alert:**
  - Account has no entry in the lookup at all (brand-new sender)
  - Beneficiary is not in the account's known list
tasks:
  detect_new_term_transactions:
    action: dynatrace.automations:execute-dql-query
    description: Join recent transactions against the known-beneficiary lookup. Return only first-time sends.
    input:
      failOnEmptyResult: false
      query: |-
        data
            record(timestamp = toTimestamp("2025-07-21T08:15:00.000000000+02:00"), `account.id` = "ACC-NL-001", `transaction.id` = "TXN-20250721-0001", `beneficiary.account` = "ACC-DE-042", `transaction.amount` = 1250.00, `transaction.currency` = "EUR", `transaction.type` = "CREDIT_TRANSFER", `transaction.status` = "COMPLETED"),
            record(timestamp = toTimestamp("2025-07-21T09:32:00.000000000+02:00"), `account.id` = "ACC-NL-001", `transaction.id` = "TXN-20250721-0002", `beneficiary.account` = "ACC-FR-018", `transaction.amount` = 340.50, `transaction.currency` = "EUR", `transaction.type` = "CREDIT_TRANSFER", `transaction.status` = "COMPLETED"),
            record(timestamp = toTimestamp("2025-07-21T10:05:00.000000000+02:00"), `account.id` = "ACC-NL-001", `transaction.id` = "TXN-20250721-0003", `beneficiary.account` = "ACC-DE-042", `transaction.amount` = 980.00, `transaction.currency` = "EUR", `transaction.type` = "PAYMENT", `transaction.status` = "COMPLETED"),
            record(timestamp = toTimestamp("2025-07-21T11:47:00.000000000+02:00"), `account.id` = "ACC-NL-001", `transaction.id` = "TXN-20250721-0004", `beneficiary.account` = "ACC-GB-007", `transaction.amount` = 2100.00, `transaction.currency` = "EUR", `transaction.type` = "CREDIT_TRANSFER", `transaction.status` = "COMPLETED"),
            record(timestamp = toTimestamp("2025-07-21T08:22:00.000000000+02:00"), `account.id` = "ACC-NL-002", `transaction.id` = "TXN-20250721-0005", `beneficiary.account` = "ACC-ES-091", `transaction.amount` = 450.00, `transaction.currency` = "EUR", `transaction.type` = "DIRECT_DEBIT", `transaction.status` = "COMPLETED"),
            record(timestamp = toTimestamp("2025-07-21T09:10:00.000000000+02:00"), `account.id` = "ACC-NL-002", `transaction.id` = "TXN-20250721-0006", `beneficiary.account` = "ACC-NL-005", `transaction.amount` = 875.25, `transaction.currency` = "EUR", `transaction.type` = "CREDIT_TRANSFER", `transaction.status` = "COMPLETED"),
            record(timestamp = toTimestamp("2025-07-21T13:55:00.000000000+02:00"), `account.id` = "ACC-NL-002", `transaction.id` = "TXN-20250721-0007", `beneficiary.account` = "ACC-ES-091", `transaction.amount` = 220.00, `transaction.currency` = "EUR", `transaction.type` = "DIRECT_DEBIT", `transaction.status` = "COMPLETED"),
            record(timestamp = toTimestamp("2025-07-21T14:30:00.000000000+02:00"), `account.id` = "ACC-NL-002", `transaction.id` = "TXN-20250721-0008", `beneficiary.account` = "ACC-BE-019", `transaction.amount` = 1600.00, `transaction.currency` = "EUR", `transaction.type` = "CREDIT_TRANSFER", `transaction.status` = "FAILED"),
            record(timestamp = toTimestamp("2025-07-21T07:58:00.000000000+02:00"), `account.id` = "ACC-NL-003", `transaction.id` = "TXN-20250721-0009", `beneficiary.account` = "ACC-IT-033", `transaction.amount` = 3200.00, `transaction.currency` = "EUR", `transaction.type` = "CREDIT_TRANSFER", `transaction.status` = "COMPLETED"),
            record(timestamp = toTimestamp("2025-07-21T10:44:00.000000000+02:00"), `account.id` = "ACC-NL-003", `transaction.id` = "TXN-20250721-0010", `beneficiary.account` = "ACC-NL-001", `transaction.amount` = 500.00, `transaction.currency` = "EUR", `transaction.type` = "PAYMENT", `transaction.status` = "COMPLETED"),
            record(timestamp = toTimestamp("2025-07-21T12:20:00.000000000+02:00"), `account.id` = "ACC-NL-003", `transaction.id` = "TXN-20250721-0011", `beneficiary.account` = "ACC-BE-012", `transaction.amount` = 760.80, `transaction.currency` = "EUR", `transaction.type` = "CREDIT_TRANSFER", `transaction.status` = "COMPLETED"),
            record(timestamp = toTimestamp("2025-07-21T15:05:00.000000000+02:00"), `account.id` = "ACC-NL-003", `transaction.id` = "TXN-20250721-0012", `beneficiary.account` = "ACC-IT-033", `transaction.amount` = 4100.00, `transaction.currency` = "EUR", `transaction.type` = "CREDIT_TRANSFER", `transaction.status` = "COMPLETED"),
            record(timestamp = toTimestamp("2025-07-21T09:00:00.000000000+02:00"), `account.id` = "ACC-NL-004", `transaction.id` = "TXN-20250721-0013", `beneficiary.account` = "ACC-NL-001", `transaction.amount` = 190.00, `transaction.currency` = "EUR", `transaction.type` = "PAYMENT", `transaction.status` = "COMPLETED"),
            record(timestamp = toTimestamp("2025-07-21T11:30:00.000000000+02:00"), `account.id` = "ACC-NL-004", `transaction.id` = "TXN-20250721-0014", `beneficiary.account` = "ACC-NL-002", `transaction.amount` = 3350.00, `transaction.currency` = "EUR", `transaction.type` = "CREDIT_TRANSFER", `transaction.status` = "COMPLETED"),
            record(timestamp = toTimestamp("2025-07-21T08:05:00.000000000+02:00"), `account.id` = "ACC-US-010", `transaction.id` = "TXN-20250721-0015", `beneficiary.account` = "ACC-NL-001", `transaction.amount` = 5000.00, `transaction.currency` = "USD", `transaction.type` = "WIRE_TRANSFER", `transaction.status` = "COMPLETED"),
            record(timestamp = toTimestamp("2025-07-21T08:40:00.000000000+02:00"), `account.id` = "ACC-US-010", `transaction.id` = "TXN-20250721-0016", `beneficiary.account` = "ACC-DE-042", `transaction.amount` = 7800.00, `transaction.currency` = "USD", `transaction.type` = "WIRE_TRANSFER", `transaction.status` = "COMPLETED"),
            record(timestamp = toTimestamp("2025-07-21T10:15:00.000000000+02:00"), `account.id` = "ACC-US-010", `transaction.id` = "TXN-20250721-0017", `beneficiary.account` = "ACC-FR-018", `transaction.amount` = 1100.00, `transaction.currency` = "USD", `transaction.type` = "WIRE_TRANSFER", `transaction.status` = "COMPLETED"),
            record(timestamp = toTimestamp("2025-07-21T16:00:00.000000000+02:00"), `account.id` = "ACC-US-010", `transaction.id` = "TXN-20250721-0018", `beneficiary.account` = "ACC-GB-007", `transaction.amount` = 9200.00, `transaction.currency` = "USD", `transaction.type` = "WIRE_TRANSFER", `transaction.status` = "PENDING"),
            record(timestamp = toTimestamp("2025-07-21T17:12:00.000000000+02:00"), `account.id` = "ACC-NL-001", `transaction.id` = "TXN-20250721-0019", `beneficiary.account` = "ACC-PL-099", `transaction.amount` = 3750.00, `transaction.currency` = "EUR", `transaction.type` = "CREDIT_TRANSFER", `transaction.status` = "COMPLETED"),
            record(timestamp = toTimestamp("2025-07-21T17:45:00.000000000+02:00"), `account.id` = "ACC-NL-003", `transaction.id` = "TXN-20250721-0020", `beneficiary.account` = "ACC-CH-055", `transaction.amount` = 12500.00, `transaction.currency` = "EUR", `transaction.type` = "WIRE_TRANSFER", `transaction.status` = "COMPLETED"),
            record(timestamp = toTimestamp("2025-07-21T18:03:00.000000000+02:00"), `account.id` = "ACC-XX-NEW", `transaction.id` = "TXN-20250721-0021", `beneficiary.account` = "ACC-NL-001", `transaction.amount` = 25000.00, `transaction.currency` = "EUR", `transaction.type` = "CREDIT_TRANSFER", `transaction.status` = "COMPLETED")
        | filter `transaction.status` == "COMPLETED"
        | lookup [load "/lookups/banking_beneficiaries"], sourceField:`account.id`, lookupField:`account.id`
        | fieldsAdd is_new_beneficiary = isNull(lookup.beneficiaries) or not(in(`beneficiary.account`, lookup.beneficiaries))
        | filter is_new_beneficiary == true
        | fields timestamp, `account.id`, `transaction.id`, `beneficiary.account`, `transaction.amount`, `transaction.currency`, `transaction.type`
        | sort timestamp asc
    name: detect_new_term_transactions
    position:
      x: 0
      "y": 1
    predecessors: []
  emit_alerts:
    action: dynatrace.automations:run-javascript
    conditions:
      states:
        extract_flagged: OK
    description: Log one alert line per new-term transaction. Extend here to send email/Slack/Davis event.
    input:
      script: |-
        import { result } from '@dynatrace-sdk/automation-utils';

        export default async function () {
          const flagged = await result('extract_flagged');

          if (!flagged || flagged.length === 0) {
            console.log('No new term transactions this run — all beneficiaries are known.');
            return { alertCount: 0, alerts: [] };
          }

          console.log(`=== FRAUD ALERT: ${flagged.length} new term transaction(s) detected ===`);

          for (const tx of flagged) {
            console.log('---');
            console.log(`  account_id:          ${tx['account.id']}`);
            console.log(`  beneficiary_account: ${tx['beneficiary.account']}`);
            console.log(`  transaction_id:      ${tx['transaction.id']}`);
            console.log(`  amount:              ${tx['transaction.amount']} ${tx['transaction.currency']}`);
            console.log(`  transaction_type:    ${tx['transaction.type']}`);
            console.log(`  timestamp:           ${tx.timestamp}`);
          }

          // TODO: extend with send-notification, Slack, or Davis event emission
          return { alertCount: flagged.length, alerts: flagged };
        }
    name: emit_alerts
    position:
      x: 0
      "y": 3
    predecessors:
      - extract_flagged
  extract_flagged:
    action: dynatrace.automations:run-javascript
    conditions:
      states:
        detect_new_term_transactions: OK
    description: Unpack DQL result into a plain array.
    input:
      script: |-
        import { result } from '@dynatrace-sdk/automation-utils';

        export default async function () {
          const r = await result('detect_new_term_transactions');
          const flagged = r.records || [];
          console.log(`New term transactions detected: ${flagged.length}`);
          return flagged;
        }
    name: extract_flagged
    position:
      x: 0
      "y": 2
    predecessors:
      - detect_new_term_transactions
